include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat these as errors (not just warnings)
    missing_required_param: error
    missing_return: error
    dead_code: warning
    todo: info
    # Ignore style warnings that don't affect functionality
    avoid_redundant_argument_values: ignore
    prefer_const_constructors: ignore
    prefer_const_literals_to_create_immutables: ignore
    prefer_expression_function_bodies: ignore
    sort_pub_dependencies: ignore
    inference_failure_on_function_invocation: ignore
    unnecessary_lambdas: ignore
    avoid_catches_without_on_clauses: ignore
    sort_constructors_first: ignore
    use_decorated_box: ignore
    unused_import: ignore
    require_trailing_commas: ignore
    unnecessary_cast: ignore
    deprecated_member_use: ignore
    avoid_dynamic_calls: ignore
    avoid_annotating_with_dynamic: ignore
    directives_ordering: ignore
  exclude:
    - "**/*.g.dart"          # Generated files (build_runner)
    - "**/*.freezed.dart"
    - "**/*.gen.dart"

linter:
  rules:
    # ── Error prevention ─────────────────────────────────────────────────
    - always_use_package_imports        # No relative imports across features
    - avoid_dynamic_calls
    - avoid_empty_else
    - avoid_print                       # Use logger package instead
    # - avoid_returning_null_for_future  # Removed in Dart 3.3.0
    - avoid_slow_async_io
    - avoid_type_to_string
    - cancel_subscriptions
    - close_sinks
    - literal_only_boolean_expressions
    - no_adjacent_strings_in_list
    - test_types_in_equals
    - throw_in_finally
    - unnecessary_statements

    # ── Style ─────────────────────────────────────────────────────────────
    - always_declare_return_types
    - annotate_overrides
    - avoid_annotating_with_dynamic
    - avoid_catches_without_on_clauses
    - avoid_catching_errors
    - avoid_field_initializers_in_const_classes
    - avoid_implementing_value_types
    - avoid_redundant_argument_values
    - avoid_returning_this
    - avoid_setters_without_getters
    - avoid_unused_constructor_parameters
    - avoid_void_async
    - directives_ordering
    - eol_at_end_of_file
    - flutter_style_todos
    - join_return_with_assignment
    - missing_whitespace_between_adjacent_strings
    - no_runtimeType_toString
    - noop_primitive_operations
    - only_throw_errors
    - package_api_docs
    - prefer_asserts_in_initializer_lists
    - prefer_const_constructors               # Critical for Flutter performance
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_constructors_over_static_methods
    - prefer_expression_function_bodies
    - prefer_final_fields
    - prefer_final_in_for_each
    - prefer_final_locals
    - prefer_if_null_operators
    - prefer_interpolation_to_compose_strings
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_null_aware_operators
    # - prefer_relative_imports  # Incompatible with always_use_package_imports
    - prefer_single_quotes
    - prefer_spread_collections
    - require_trailing_commas               # Enforces clean dartfmt output
    - sort_child_properties_last            # child: always last in widgets
    - sort_constructors_first
    - sort_unnamed_constructors_first
    - type_annotate_public_apis
    - unnecessary_await_in_return
    - unnecessary_lambdas
    - unnecessary_null_aware_assignments
    - unnecessary_parenthesis
    - unnecessary_raw_strings
    - unnecessary_string_escapes
    - unnecessary_string_interpolations
    - use_decorated_box                     # Prefer DecoratedBox over Container when no sizing
    - use_enums
    - use_if_null_to_convert_nulls_to_bools
    - use_is_even_rather_than_modulo
    - use_named_constants
    - use_raw_strings
    - use_setters_to_change_properties
    - use_string_buffers
    - use_super_parameters              # Dart 3 super-parameter syntax

    # ── Pub ───────────────────────────────────────────────────────────────
    - depend_on_referenced_packages
    - secure_pubspec_urls
    - sort_pub_dependencies
