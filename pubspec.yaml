name: proptrack
description: Property Installment Tracker — Cross-platform Flutter app for managing real-estate payment plans.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  dio: ^5.4.3+1
  equatable: ^2.0.5
  excel: ^4.0.2
  file_picker: ^8.0.3
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_local_notifications: ^17.2.1+2
  flutter_pdfview: ^1.3.2
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0
  flutter_secure_storage: ^9.2.2
  fpdart: ^1.1.0
  gap: ^3.0.1
  go_router: ^13.2.1
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  local_auth: ^2.3.0
  logger: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.3
  pdf: ^3.10.8
  printing: ^5.12.0
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  supabase_flutter: ^2.5.5
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  mocktail: ^1.0.3
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env

  # fonts: (add custom fonts in Sprint 1)
